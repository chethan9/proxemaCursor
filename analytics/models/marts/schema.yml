version: 2

models:
  - name: fct_orders
    description: >
      Order-level facts (one row per order). Tenant column: store_id.
      Metrics here aggregate at order grain — suitable for revenue and order counts.
    meta:
      label: Orders
    columns:
      - name: order_id
        description: Primary key for this mart (application order id).
        tests:
          - unique
          - not_null
        meta:
          dimension:
            type: string
          metrics:
            order_count:
              type: count_distinct
              label: Order count
              description: Distinct orders in the result set.

      - name: store_id
        description: Tenant scope — filter in Metabase (locked store_id) or any BI tool.
        tests:
          - not_null
        meta:
          dimension:
            type: string

      - name: woo_id
        meta:
          dimension:
            type: number

      - name: order_number
        meta:
          dimension:
            type: string

      - name: order_created_at
        description: When the order was created (business timestamp for time series).
        tests:
          - not_null
        meta:
          dimension:
            type: timestamp
            time_intervals: ["DAY", "WEEK", "MONTH", "QUARTER", "YEAR"]

      - name: order_modified_at
        meta:
          dimension:
            type: timestamp

      - name: status
        meta:
          dimension:
            type: string

      - name: currency
        meta:
          dimension:
            type: string

      - name: payment_method
        meta:
          dimension:
            type: string

      - name: order_total
        description: Order total (from WooCommerce sync).
        meta:
          dimension:
            type: number
          metrics:
            total_revenue:
              type: sum
              label: Total revenue
              description: Sum of order totals (respect current filters).
              round: 2
            avg_order_value:
              type: average
              label: Avg order total
              round: 2

      - name: order_subtotal
        meta:
          dimension:
            type: number
          metrics:
            total_subtotal:
              type: sum
              label: Total subtotal
              round: 2

      - name: order_tax
        meta:
          metrics:
            total_tax:
              type: sum
              label: Total tax
              round: 2

      - name: discount_total
        meta:
          metrics:
            total_discounts:
              type: sum
              label: Total discounts
              round: 2

      - name: shipping_total
        meta:
          metrics:
            total_shipping:
              type: sum
              label: Total shipping
              round: 2

      - name: customer_id
        meta:
          dimension:
            type: number

      - name: payment_method_title
        meta:
          dimension:
            type: string

      - name: billing_country
        description: Billing address country (from WooCommerce billing JSON).
        meta:
          dimension:
            type: string

      - name: billing_state
        description: Billing region / state.
        meta:
          dimension:
            type: string

      - name: billing_city
        description: Billing city.
        meta:
          dimension:
            type: string

      - name: order_hour_utc
        description: Hour of day (0–23) in UTC for peak-time / heatmap charts.
        meta:
          dimension:
            type: number

      - name: order_dow_utc
        description: Day of week (0=Sun … 6=Sat) in UTC, for heatmaps with hour.
        meta:
          dimension:
            type: number

      - name: order_weekday_label
        meta:
          dimension:
            type: string

      - name: customer_email
        description: Joined from customers when customer_id matches Woo customer.
        meta:
          dimension:
            type: string

      - name: customer_display_name
        meta:
          dimension:
            type: string

  - name: fct_order_lines
    description: >
      Line-item grain from WooCommerce line_items JSON, enriched with product/category from catalog when product_id matches.
      Use for product, variant, and category sales. Do not sum line revenue and order revenue in one chart.
    meta:
      label: Order lines
    columns:
      - name: order_line_id
        description: Surrogate key for a line on an order.
        tests:
          - unique
          - not_null
        meta:
          dimension:
            type: string

      - name: order_id
        tests:
          - not_null
        meta:
          dimension:
            type: string
          metrics:
            order_count:
              type: count_distinct
              label: Order count
              description: Distinct orders (for line-level explores).

      - name: store_id
        tests:
          - not_null
        meta:
          dimension:
            type: string

      - name: order_created_at
        meta:
          dimension:
            type: timestamp
            time_intervals: ["DAY", "WEEK", "MONTH", "QUARTER", "YEAR"]

      - name: order_status
        meta:
          dimension:
            type: string

      - name: currency
        meta:
          dimension:
            type: string

      - name: product_name
        meta:
          dimension:
            type: string

      - name: product_sku
        meta:
          dimension:
            type: string

      - name: primary_category_name
        meta:
          dimension:
            type: string

      - name: variant_label
        description: Line item display name (includes variation text from Woo).
        meta:
          dimension:
            type: string

      - name: is_variation
        meta:
          dimension:
            type: boolean

      - name: quantity
        meta:
          dimension:
            type: number
          metrics:
            units_sold:
              type: sum
              label: Units sold
              round: 2

      - name: line_subtotal
        description: Line subtotal before tax (Woo line field).
        meta:
          dimension:
            type: number
          metrics:
            gross_line_sales:
              type: sum
              label: Gross line sales
              description: Sum of line subtotals.
              round: 2

      - name: line_total
        description: Line total after line-level adjustments (Woo line field).
        meta:
          dimension:
            type: number
          metrics:
            line_net_sales:
              type: sum
              label: Line net sales
              description: Sum of line totals.
              round: 2

  - name: fct_coupon_lines
    description: One row per coupon application on an order (from coupon_lines JSON).
    meta:
      label: Coupon lines
    columns:
      - name: coupon_line_id
        tests:
          - unique
          - not_null
        meta:
          dimension:
            type: string

      - name: store_id
        tests:
          - not_null
        meta:
          dimension:
            type: string

      - name: order_id
        meta:
          dimension:
            type: string
          metrics:
            orders_with_coupon:
              type: count_distinct
              label: Orders (with coupon line)

      - name: order_created_at
        meta:
          dimension:
            type: timestamp
            time_intervals: ["DAY", "WEEK", "MONTH", "QUARTER", "YEAR"]

      - name: coupon_code
        meta:
          dimension:
            type: string

      - name: coupon_discount_total
        meta:
          metrics:
            total_coupon_discount:
              type: sum
              label: Total coupon discount
              round: 2

  - name: fct_shipping_lines
    description: One row per shipping method line on an order.
    meta:
      label: Shipping lines
    columns:
      - name: shipping_line_id
        tests:
          - unique
          - not_null
        meta:
          dimension:
            type: string

      - name: store_id
        tests:
          - not_null
        meta:
          dimension:
            type: string

      - name: order_id
        meta:
          dimension:
            type: string
          metrics:
            order_count:
              type: count_distinct
              label: Order count

      - name: order_created_at
        meta:
          dimension:
            type: timestamp
            time_intervals: ["DAY", "WEEK", "MONTH", "QUARTER", "YEAR"]

      - name: shipping_method_title
        meta:
          dimension:
            type: string

      - name: shipping_line_total
        meta:
          metrics:
            total_shipping_charged:
              type: sum
              label: Shipping revenue
              round: 2
